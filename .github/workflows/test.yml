name: Test Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true
      - name: Build exampleSite
        run: cd exampleSite && hugo --gc --minify
